<!DOCTYPE html>
<html>
<head>
    <title>Version Check</title>
    <style>
        body { 
            background: #1a1a1a; 
            color: white; 
            font-family: Arial; 
            padding: 20px; 
        }
        .version-info { 
            background: #2a2a2a; 
            padding: 15px; 
            border-radius: 8px; 
        }
    </style>
</head>
<body>
    <div class="version-info">
        <h1>Versión Actualizada - Tema Oscuro</h1>
        <p>Si ves fondo oscuro, la versión está actualizada</p>
        <p>Si ves fondo claro/rosa, necesitas actualizar los archivos</p>
        <hr>
        <p><strong>Variables CSS:</strong></p>
        <p>--bg-dark: #1a1a1a (debería ser el fondo)</p>
        <p>--primary-pink: #e45b7a</p>
        <p>--primary-green: #b4b9ad</p>
    </div>
</body>
</html>
